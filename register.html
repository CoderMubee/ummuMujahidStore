<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Account - UmmuMujahid Store</title>
    <link rel="stylesheet" href="sample_login.css">

</head>

<body class="register__body">
    <div class="register__container">
        <nav class="register__nav account__nav">
            <a href="index.html" class="register_nav__anchor account_nav__anchor"><img src="icons/home-30.png"
                    alt="home icon" class="regiter_nav__img account_nav__img"></a>
        </nav>
        <h2 class="register__title">Create Account</h2>
        <form>
            <!-- Compulsory -->
            <input type="text" class="register__input" placeholder="Full Name" required>
            <input type="email" class="register__input" placeholder="Email Address" required>
            <input type="password" class="register__input" placeholder="Password" required>
            <input type="password" class="register__input" placeholder="Confirm Password" required>

            <!-- Optional -->
            <input type="tel" class="register__input" placeholder="Phone Number (Optional)">
            <input type="text" class="register__input" placeholder="Address (Optional)">

            <!-- Compulsory -->
            <input type="text" class="register__input" placeholder="State" required>
            <input type="text" class="register__input" placeholder="Country" required>

            <!-- Optional -->
            <select class="register__select">
                <option value="">Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <label>
                <input type="checkbox"> Subscribe to Newsletter (Optional)
            </label>

            <button type="submit" class="register__button">Register</button>
        </form>
        <div class="register__links">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
</body>

</html>
